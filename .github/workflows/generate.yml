name: Generate L10n

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Archive generated files
        run: |
          if [ -d lib/generated ]; then
            zip -r generated.zip lib/generated
          else
            echo "lib/generated not found. Contents of lib:"
            ls -la lib/
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: generated-l10n
          path: generated.zip
